services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file: frontend/.env.local
    environment:
      API_INTERNAL_URL: http://api:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads

  worker:
    build: ./backend
    command: celery -A src.workers.analysis_worker worker --loglevel=info
    env_file: backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: databrief
      POSTGRES_PASSWORD: databrief
      POSTGRES_DB: databrief
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  uploads_data:
